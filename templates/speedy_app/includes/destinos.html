{% load static %}

<section id="destinos" class="py-16 bg-white">
  <div class="container">
    <!-- Section Title -->
    <div class="text-center md:text-left mb-12 relative">
      <span class="absolute -top-6 left-0 text-6xl md:text-8xl font-bold opacity-5 select-none z-0"
        style="color: var(--text-muted);">Destinations</span>
      <h2 class="text-3xl md:text-5xl font-bold relative z-10"
        style="font-family: var(--font-display); color: var(--text-main);">Available Destinations</h2>
    </div>

    <!-- 3-column grid: one column per destination zone -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- ===== PUERTO VALLARTA ===== -->
      <div class="flex flex-col">
        <h3 class="text-lg font-bold mb-4 pb-2 border-b-2" style="color: var(--primary); border-color: var(--primary);">
          Puerto Vallarta</h3>
        <div class="card overflow-hidden group p-0 border-0 shadow-md hover:shadow-xl transition-shadow flex-1">
          <div class="relative h-64 overflow-hidden">
            <img src="{% static 'images/destinos1.png' %}"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
              alt="Puerto Vallarta">
            <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
          </div>
          <div class="p-4">
            <h4 class="text-xl font-bold" style="color: var(--text-main);">Hotel Zone</h4>
            <p class="text-sm mt-1" style="color: var(--text-muted);">Puerto Vallarta</p>
          </div>
        </div>
      </div>

      <!-- ===== RIVIERA NAYARIT ===== -->
      <div class="flex flex-col">
        <h3 class="text-lg font-bold mb-4 pb-2 border-b-2" style="color: var(--primary); border-color: var(--primary);">
          Riviera Nayarit</h3>
        <div class="card overflow-hidden group p-0 border-0 shadow-md hover:shadow-xl transition-shadow flex-1">
          <div class="relative h-64 overflow-hidden">
            <img src="{% static 'images/destinos2.png' %}"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
              alt="Riviera Nayarit">
            <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
          </div>
          <div class="p-4">
            <h4 class="text-xl font-bold" style="color: var(--text-main);">Nuevo Vallarta</h4>
            <p class="text-sm mt-1" style="color: var(--text-muted);">Riviera Nayarit</p>
          </div>
        </div>
      </div>

      <!-- ===== PUNTA DE MITA ===== -->
      <div class="flex flex-col">
        <h3 class="text-lg font-bold mb-4 pb-2 border-b-2" style="color: var(--primary); border-color: var(--primary);">
          Punta de Mita</h3>
        <div class="card overflow-hidden group p-0 border-0 shadow-md hover:shadow-xl transition-shadow flex-1">
          <div class="relative h-64 overflow-hidden">
            <img src="{% static 'images/destinos3.png' %}"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
              alt="Punta de Mita">
            <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
          </div>
          <div class="p-4">
            <h4 class="text-xl font-bold" style="color: var(--text-main);">Punta de Mita</h4>
            <p class="text-sm mt-1" style="color: var(--text-muted);">Exclusive Area</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
